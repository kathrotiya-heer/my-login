<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(
-45deg,
#2563eb,
#7c3aed,
#06b6d4,
#2563eb
);
background-size:400% 400%;
animation:gradient 12s ease infinite;
padding:20px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.blob{
position:absolute;
border-radius:50%;
filter:blur(70px);
opacity:.5;
animation:float 10s infinite ease-in-out;
}

.blob1{
width:250px;
height:250px;
background:#60a5fa;
top:-50px;
left:-50px;
}

.blob2{
width:300px;
height:300px;
background:#a855f7;
bottom:-50px;
right:-50px;
}

.blob3{
width:220px;
height:220px;
background:#22d3ee;
top:40%;
left:40%;
}

@keyframes float{
50%{
transform:translateY(-30px);
}
}

.login-box{
position:relative;
z-index:10;
width:100%;
max-width:420px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
font-size:32px;
color:#111827;
}

.logo p{
font-size:14px;
color:#6b7280;
margin-top:5px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:500;
color:#374151;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:10px;
outline:none;
font-size:14px;
}

input:focus{
border-color:#2563eb;
}

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:15px;
top:15px;
cursor:pointer;
font-size:12px;
font-weight:600;
color:#2563eb;
}

.hint{
font-size:12px;
color:#6b7280;
margin-top:5px;
}

.error{
font-size:12px;
color:#dc2626;
margin-top:5px;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
font-size:14px;
}

.options a{
text-decoration:none;
color:#2563eb;
}

.login-btn{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.signup{
text-align:center;
margin-top:20px;
font-size:14px;
}

.signup a{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
z-index:100;
}

.modal-content{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
animation:popup .3s ease;
}

@keyframes popup{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.modal-content h2{
color:#16a34a;
margin-bottom:10px;
}

.modal-content p{
color:#6b7280;
margin-bottom:15px;
}

.modal-content button{
padding:10px 20px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="login-box">

<div class="logo">
<h1>Login</h1>
<p>Welcome Back</p>
</div>

<form id="loginForm">

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="example@gmail.com">

<div class="hint">
Example: example@gmail.com
</div>

<div id="emailError" class="error"></div>

</div>

<div class="form-group">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="John@1234">

<span
class="toggle"
onclick="togglePassword()">
Show </span>

</div>

<div class="hint">
Example: John@1234
</div>

<div id="passwordError" class="error"></div>

</div>

<div class="options">

<label>
<input type="checkbox" style="width:auto;">
Remember Me
</label>

<a href="#">
Forgot Password?
</a>

</div>

<button
type="submit"
class="login-btn">
Login </button>

</form>

<div class="signup">
Don't have an account?
<a href="#">
Sign Up
</a>
</div>

</div>

<div class="modal" id="successModal">

<div class="modal-content">

<h2>🎉 Login Successful</h2>

<p id="welcomeText"></p>

<button onclick="closeModal()">
Continue
</button>

</div>

</div>

<script>

function togglePassword(){

const password =
document.getElementById("password");

const toggle =
document.querySelector(".toggle");

if(password.type==="password"){
password.type="text";
toggle.innerHTML="Hide";
}else{
password.type="password";
toggle.innerHTML="Show";
}

}

function speakWelcome(){

const email =
document.getElementById("email").value;

const name =
email.split("@")[0];

const speech =
new SpeechSynthesisUtterance(
"Welcome " + name +
". Login successful."
);

speech.rate = 1;
speech.pitch = 1;
speech.volume = 1;

window.speechSynthesis.speak(speech);

}

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

let valid = true;

const email =
document.getElementById("email");

const password =
document.getElementById("password");

document.getElementById("emailError")
.innerHTML="";

document.getElementById("passwordError")
.innerHTML="";

const emailPattern =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

const passwordPattern =
/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

if(!emailPattern.test(email.value)){

document.getElementById("emailError")
.innerHTML =
"Please enter a valid email";

valid = false;

}

if(!passwordPattern.test(password.value)){

document.getElementById("passwordError")
.innerHTML =
"Use 8+ chars with A-Z, a-z, number and symbol";

valid = false;

}

if(valid){

const name =
email.value.split("@")[0];

document.getElementById("welcomeText")
.innerHTML =
"Welcome Back, " + name;

speakWelcome();

document.getElementById("successModal")
.style.display = "flex";

}

});

function closeModal(){

document.getElementById("successModal")
.style.display = "none";

}

</script>

    <p style="color: #666; font-size: 14px; margin-bottom: 5px;">Total Visitors:</p>
    <img src="https://glitch.me" alt="Visitor Count" />
</div>
<!-- Live Visitor Counter Code End -->

</body>
</html>
```
